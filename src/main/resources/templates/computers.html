<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Computer List</title>
<link rel="stylesheet" th:href="@{/css/computers.css}">
</head>
<body>

<div class="main-container">

    <h1>Computers Page</h1>

    <!-- ===== SEARCH BAR ===== -->
    <div class="search-bar">
        <form th:action="@{/computers}" method="get">

            <input type="text" name="name"
                   placeholder="Search by name..."
                   th:value="${param.name}" />

            <input type="text" name="manufactureName"
                   placeholder="Manufacture..."
                   th:value="${param.manufactureName}" />

            <input type="number" name="maxPrice"
                   placeholder="Max price..."
                   th:value="${param.maxPrice}" />

            <button type="submit">Search</button>
        </form>
    </div>


    <!-- ===== PRODUCT GRID ===== -->
    <div class="product-grid">
        <div th:each="comp : ${computers}" class="product-card">

            <a th:href="@{/computers/{id}(id=${comp.id})}" class="product-link">
                <div class="card-header">
                    <div class="image-wrapper">
                        <img th:src="${comp.imagePath}" alt="Computer Image">
                    </div>
                </div>
            </a>

            <div class="card-content">
                <a th:href="@{/computers/{id}(id=${comp.id})}" class="product-name-link">
                    <h3 class="product-name" th:text="${comp.name}">Name</h3>
                </a>

                <p class="manufacture" th:text="${comp.manufactureName}">Manufacture</p>

                <div class="price-container">
                    <span class="current-price" th:text="${comp.formattedPrice}">¥0</span>
                </div>

                <p class="description" th:text="${comp.description}">Description</p>
            </div>

            <button class="btn-quick-buy">QUICK BUY</button>
        </div>
    </div>


    <!-- ===== PAGINATION ===== -->
    <div class="pagination-bar" th:if="${totalPages > 1}">

        <!-- Previous -->
        <a th:if="${currentPage > 0}"
           th:href="@{/computers(
                page=${currentPage - 1},
                name=${param.name},
                manufactureName=${param.manufactureName},
                maxPrice=${param.maxPrice}
           )}">
            ← Previous
        </a>

        <span th:if="${currentPage == 0}" class="disabled">
            ← Previous
        </span>


        <!-- Page info -->
        <span class="page-numbers">
            Page <strong th:text="${currentPage + 1}">1</strong> of
            <strong th:text="${totalPages}">5</strong>
        </span>


        <!-- Next -->
        <a th:if="${currentPage + 1 < totalPages}"
           th:href="@{/computers(
                page=${currentPage + 1},
                name=${param.name},
                manufactureName=${param.manufactureName},
                maxPrice=${param.maxPrice}
           )}">
            Next →
        </a>

        <span th:if="${currentPage + 1 == totalPages}" class="disabled">
            Next →
        </span>

    </div>


    <!-- Back home -->
    <p style="margin-top: 16px;">
        <a th:href="@{/home}">⬅ Back to HomePage</a>
    </p>

</div>

</body>
</html>
