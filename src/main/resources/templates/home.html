<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta name="_csrf" th:content="${_csrf.token}" />
<meta name="_csrf_header" th:content="${_csrf.headerName}" />
<meta charset="UTF-8" />
<title>Home Page</title>
<link rel="stylesheet" th:href="@{/css/home.css}">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="/js/home.js" defer></script>
</head>
<body>
	<h2>Chào mừng bạn đã đăng nhập!</h2>

	<!-- Nút Tùy chọn -->
	<div class="options-container">
		<button id="btnOptions">Tùy chọn</button>
		<div id="optionsMenu">
			<form th:action="@{/logout}" method="post" style="margin: 0;">
				<input type="hidden" th:name="${_csrf.parameterName}"
					th:value="${_csrf.token}" />
				<button type="submit">Đăng xuất</button>
			</form>
			<button id="btnUserInfo">Xem thông tin người dùng</button>
			<button id="show-change-password">Đổi mật khẩu</button>
		</div>
	</div>

	<!-- Các ảnh địa điểm -->
	<div class="flex-box">
		<div class="child">
			<a
				href="https://vietnam.travel/jp/places-to-go/southern-vietnam/ho-chi-minh-city"
				target="_blank"> <img
				src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/24/PANO0002-Pano.jpg/1200px-PANO0002-Pano.jpg"
				alt="Ho Chi Minh City">
				<p class="highlight">HO CHI MINH CITY</p>
			</a>
		</div>
		<div class="child">
			<img
				src="https://media.vneconomy.vn/images/upload/2024/02/28/phu-quoc.jpg"
				alt="Phu Quoc Island">
			<p class="highlight">PHU QUOC ISLAND</p>
		</div>
		<div class="child">
			<img
				src="https://www.pelago.com/img/products/VN-Vietnam/2-day-sapa-tour-fanisan-peak-ethnic-village/0718-0652_2-day-sapa-tour-fanisan-peak-ethnic-village-vietnam-pelago1.jpg"
				alt="Sapa Viet Nam">
			<p class="highlight">SAPA VIET NAM</p>
		</div>
		<div class="child">
			<img
				src="https://cdnmedia.baotintuc.vn/Upload/XjfgEPYM30O8z6jY3MHxSw/files/2025/03/0303/Cau-Vang.jpg"
				alt="Ba Na Hill">
			<p class="highlight">BANA HILL</p>
		</div>
	</div>

	<!-- Thông tin tài khoản -->
	<div id="userInfoResult"></div>
	<h2>Thông tin tài khoản</h2>

	<!-- Form đổi mật khẩu (ẩn ban đầu) -->
	<div id="change-password-form" style="display: none; margin-top: 10px;">
		<label for="oldPassword">Mật khẩu cũ:</label> <input type="password"
			id="oldPassword"><br> <br> <label for="newPassword">Mật
			khẩu mới:</label> <input type="password" id="newPassword"><br> <br>
		<button id="submit-change-password">Xác nhận đổi</button>
	</div>
	<p id="changePasswordResult" style="color: green;"></p>

	<!-- Sản phẩm -->
	<button id="btnGetProducts">Xem tất cả sản phẩm</button>
	<div id="productListPage"></div>

	<!-- Đi sang trang products.html -->
	<a href="/products" class="btn-goto">Go to Product</a>
	<br>
	<a href="/manufactures" class="btn-goto">Go to Manufacture</a>
	<a href="/computers" class="btn-goto">Go to Computer</a>

	<div id="productList" style="display: none;"></div>

	<script src="/js/home.js"></script>
	<script src="/js/product.js"></script>

	<!-- Script bật/tắt menu và form -->
	<script>
		$(document).ready(function() {
			// Toggle menu
			$("#btnOptions").click(function() {
				$("#optionsMenu").toggle();
			});

			// Toggle form đổi mật khẩu
			$("#show-change-password").click(function() {
				$("#change-password-form").toggle();
			});
		});
	</script>
</body>
</html>
