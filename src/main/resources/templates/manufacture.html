<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
<meta name="_csrf" th:content="${_csrf.token}" />
<meta name="_csrf_header" th:content="${_csrf.headerName}" />
<meta charset="UTF-8">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<title>Danh sách Nhà sản xuất</title>
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">

	<div class="container mt-5">
		<h2 class="text-center mb-4 text-primary">Danh sách Nhà sản xuất</h2>

		<!-- Bảng danh sách -->
		<table
			class="table table-bordered table-striped shadow-sm align-middle">
			<thead class="table-primary text-center">
				<tr>
					<th>ID</th>
					<th>Manufacture Name</th>
					<th>Address</th>
					<th>Phone Number</th>
					<th>Email</th>
					<th>Description</th>
					<th>Action</th>
				</tr>
			</thead>

			<tbody>
				<tr th:each="m : ${manufactures}">
					<td th:text="${m.id}"></td>
					<td th:text="${m.name}"></td>
					<td th:text="${m.address}"></td>
					<td th:text="${m.phone}"></td>
					<td th:text="${m.email}"></td>
					<td th:text="${m.description}"></td>
					<td class="text-center"><a
						th:href="@{'/manufactures/' + ${m.id}}"
						class="btn btn-sm btn-info text-white">detail</a>
						<button type="button" class="delete-btn"
							th:data-id="${m.id}"
							onclick="return confirm('Bạn có chắc muốn xóa nhà sản xuất này không?')">
							Delete</button></td>
				</tr>
			</tbody>
		</table>

		<!-- Điều khiển phân trang -->
		<div class="d-flex justify-content-center align-items-center mt-4">
			<!-- Nút Previous -->
			<a th:if="${currentPage > 0}"
				th:href="@{/manufactures(page=${currentPage - 1}, size=${pageSize})}"
				class="btn btn-outline-primary me-3"> ⬅ Previous </a>

			<!-- Hiển thị số trang -->
			<span>Trang <strong th:text="${currentPage + 1}"></strong> / <strong
				th:text="${totalPages}"></strong>
			</span>

			<!-- Nút Next -->
			<a th:if="${currentPage < totalPages - 1}"
				th:href="@{/manufactures(page=${currentPage + 1}, size=${pageSize})}"
				class="btn btn-outline-primary ms-3"> Next ➡ </a>
		</div>

		<!-- Nút quay lại trang chủ -->
		<div class="text-center mt-4">
			<a th:href="@{/home}" class="btn btn-secondary">⬅ Back to HomePage</a>
		</div>
		<div class="d-flex justify-content-end mb-3">
			<button id="addManufactureBtn" type="button" class="btn btn-success">➕
				Add new Manufacture</button>
		</div>

	</div>

	<script th:src="@{/js/manufacture.js}"></script>
</body>
</html>
