<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết đơn hàng | Computer Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/css/order-detail.css">

</head>
<body class="bg-light">

<div class="container py-5">
    <div class="mb-4">
        <a href="/orders/history" class="text-decoration-none text-secondary">
            <i class="fas fa-arrow-left"></i> Quay lại lịch sử đơn hàng
        </a>
    </div>

    <div class="row">
        <div class="col-lg-8">
            <div class="card shadow-sm border-0 mb-4">
                <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">Đơn hàng #<span id="displayOrderId">[[${orderId}]]</span></h5>
                    <span id="statusBadge" class="badge rounded-pill bg-primary text-white">Đang tải...</span>
                </div>
                <div class="card-body">
                    <div id="orderItemsContainer">
                        <div class="text-center py-4">
                            <div class="spinner-border text-primary" role="status"></div>
                            <p class="mt-2">Đang tải danh sách sản phẩm...</p>
                        </div>
                    </div>
                    
                    <hr class="my-4">
                    
                    <div class="d-flex justify-content-between mb-2">
                        <span class="text-muted">Tạm tính:</span>
                        <span id="subTotal" class="fw-bold">0 ¥</span>
                    </div>
                    <div class="d-flex justify-content-between mb-2">
                        <span class="text-muted">Phí vận chuyển:</span>
                        <span class="text-success fw-bold">Miễn phí</span>
                    </div>
                    <div class="d-flex justify-content-between mt-3 pt-3 border-top">
                        <h4 class="mb-0">Tổng cộng:</h4>
                        <h4 id="finalTotal" class="text-danger mb-0">0 ¥</h4>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="card shadow-sm border-0 mb-4">
                <div class="card-header bg-white py-3">
                    <h5 class="mb-0">Thông tin giao hàng</h5>
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <label class="text-muted small uppercase fw-bold">Người đặt:</label>
                        <p class="mb-0 fw-medium" th:text="${#authentication.name}"></p>
                    </div>
                    <div class="mb-3">
                        <label class="text-muted small uppercase fw-bold">Số điện thoại:</label>
                        <p id="displayPhone" class="mb-0 fw-medium">...</p>
                    </div>
                    <div class="mb-3">
                        <label class="text-muted small uppercase fw-bold">Địa chỉ nhận hàng:</label>
                        <p id="displayAddress" class="mb-0 fw-medium">...</p>
                    </div>
                    <div class="mb-0">
                        <label class="text-muted small uppercase fw-bold">Ngày đặt hàng:</label>
                        <p id="displayDate" class="mb-0 fw-medium">...</p>
                    </div>
                </div>
            </div>

            <div id="actionArea" class="d-grid gap-2">
                </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    /* Thymeleaf nhúng ID vào đây, xóa dấu phẩy 'ngáo' đi rồi nhé */
    const ORDER_ID = [[${orderId}]];
</script>
<script src="/js/order-detail.js"></script>
</body>
</html>
