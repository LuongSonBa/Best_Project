<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Add Product</title>

    <!-- Link CSS đẹp xịn -->
    <link rel="stylesheet" href="/css/product-add.css">

    <!-- CSRF -->
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
</head>

<body>
    <h1>Add New Product</h1>

    <form id="productForm">
        <label>Name:</label>
        <input type="text" id="name" required>

        <label>Price:</label>
        <input type="number" step="0.01" id="price" required>

        <label>Description:</label>
        <textarea id="description"></textarea>

        <label>Image:</label>
        <input type="file" id="image" accept="image/*" required>

        <label>Active:</label>
        <select id="active">
            <option value="true">Active</option>
            <option value="false">Inactive</option>
        </select>

        <label>Manufacture:</label>
        <select id="manufactureId">
            <option value="">-- No Manufacturer --</option>
            <th:block th:each="m : ${manufactures}">
                <option th:value="${m.id}" th:text="${m.name}"></option>
            </th:block>
        </select>

        <button type="button" id="saveBtn">Save</button>
        <a href="/products" id="backBtn">← Back to Product Lists</a>
        <a th:href="@{/home}" id="homeBtn">⬅ Back to HomePage</a>
    </form>

    <script src="/js/product-add.js"></script>
</body>
</html>
