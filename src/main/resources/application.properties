spring.application.name=Login_Project
server.port=9095

# === MYSQL ===
spring.datasource.url=jdbc:mysql://localhost:3306/users?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password==20022001Lsb
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# === JPA / Hibernate ===
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# === Flyway ===
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ===== LOGBOOK =====
logbook.include=/api/**
logbook.exclude=/css/**,/js/**,/images/**,/favicon.ico,/actuator/health

logbook.filter.enabled=true
logbook.secure-filter.enabled=true

logbook.format.style=http
logbook.strategy=body-only-if-status-at-least
logbook.minimum-status=200

logbook.obfuscate.headers=Authorization,X-CSRF-TOKEN,Cookie
logbook.obfuscate.parameters=password,token
logbook.obfuscate.body.patterns="password":".*"




logbook.write.chunk-size=4096

# ===== LOGGING LEVEL =====
logging.level.root=INFO
logging.level.com.example.login=INFO
logging.level.org.zalando.logbook.Logbook=TRACE
logging.level.com.example.login.controller=INFO
logging.level.com.example.login.service=DEBUG


# ===== OPEN API =====
open.api.title=Login Project API
open.api.version=1.0.0
open.api.description=API for Login Project
open.api.serverUrl=http://localhost:9095
open.api.serverName=Local Server



spring.jpa.properties.hibernate.envers.audit_table_suffix=_aud
spring.jpa.properties.hibernate.envers.revision_field_name=rev
spring.jpa.properties.hibernate.envers.revision_type_field_name=revtype
spring.jpa.properties.hibernate.envers.store_data_at_delete=true
logging.level.org.hibernate.envers=DEBUG



spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
